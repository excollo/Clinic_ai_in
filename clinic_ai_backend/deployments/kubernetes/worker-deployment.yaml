apiVersion: apps/v1
kind: Deployment
metadata:
  name: clinic-ai-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clinic-ai-worker
  template:
    metadata:
      labels:
        app: clinic-ai-worker
    spec:
      containers:
        - name: worker
          image: clinic-ai-worker:latest
