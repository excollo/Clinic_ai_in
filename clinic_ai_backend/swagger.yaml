    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Service healthy
  /patients:
    get:
      tags: [Patients]
      summary: List patients
      responses:
        "200":
          description: OK
components:
  schemas: {}
  securitySchemes: {}
